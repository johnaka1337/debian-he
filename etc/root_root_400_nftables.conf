#!/usr/sbin/nft -f

# Purge existing ruleset to ensure a clean state
flush ruleset

table inet filter {
    # --- INBOUND TRAFFIC POLICY ---
    chain input {
        # Default policy: DROP. Implement "Silent Drop" for stealth and security.
        type filter hook input priority 0; policy drop;

        # 0. Sanity Check: Drop packets with 'invalid' connection state.
        # [LOGGING]: Log invalid packets before dropping them (max 2 per min).
        ct state invalid limit rate 2/minute burst 5 packets log prefix "[nftables-INVALID] " level warn
        ct state invalid drop

        # 1. Stateful Inspection: Accept traffic associated with established sessions.
        # Necessary for return traffic from outbound requests (Fast Path).
        ct state established,related accept

        # 2. Loopback Interface: Permit all traffic on 'lo' for inter-process communication.
        iifname "lo" accept

        # 3. Anti-Spoofing: Drop external traffic claiming to be loopback.
        iifname != "lo" ip saddr 127.0.0.0/8 drop
        iifname != "lo" ip6 saddr ::1 drop

        # 4. TCP Hardening: Drop TCP packets attempting to open a connection without the SYN flag.
        # Defends against FIN/XMAS/NULL stealth scans.
        # [LOGGING]: Log bad TCP states (max 5 per min).
        tcp flags != syn ct state new limit rate 5/minute burst 5 packets log prefix "[nftables-BAD-TCP] " level warn
        tcp flags != syn ct state new drop

        # 4a. ICMPv4 Control Plane: Rate Limited.
        # Allowed: PMTUD (destination-unreachable) to prevent fragmentation, and Traceroute (time-exceeded).
        # STEALTH: 'echo-request' is DROPPED. The system will not respond to external pings.
        ip protocol icmp icmp type { destination-unreachable, time-exceeded } limit rate 10/second accept

        # 5. ICMPv6 Neighbor Discovery: Essential for IPv6 stack functionality.
        # Security: Enforce Hop Limit 255 to ensure packets originate from the local link only (GTSM).
        ip6 nexthdr icmpv6 ip6 hoplimit 255 icmpv6 type { nd-neighbor-solicit, nd-neighbor-advert, nd-router-advert } accept

        # 6. Remote Management (Optional): Uncomment for SSH access.
        # tcp dport 22 accept

        # 7. Local Noise Filter: Silently drop known noisy local broadcasts (Steam, mDNS) to keep logs clean.
        udp dport 27036 drop
        udp dport 5353 drop

        # 8. DEFAULT DROP LOGGING (Catch-All)
        # Any packet that reaches here was not explicitly accepted above.
        # [LOGGING]: Log uninvited packets before they hit the default DROP policy (max 1 per sec).
        limit rate 1/second burst 10 packets log prefix "[nftables-DEFAULT-DROP] " level warn
    }

    # --- FORWARDING POLICY ---
    chain forward {
        # Host is not a router. Drop all transit traffic.
        type filter hook forward priority 0; policy drop;
    }

    # --- OUTBOUND TRAFFIC POLICY ---
    chain output {
        # Permit all outbound traffic for system and user applications.
        type filter hook output priority 0; policy accept;

        # Prevent the local system from transmitting invalid or malformed packets.
        # [LOGGING]: Log if our own system tries to send malformed packets (could indicate a compromised local process).
        ct state invalid limit rate 2/minute burst 5 packets log prefix "[nftables-OUT-INVALID] " level warn
        ct state invalid drop
    }
}
