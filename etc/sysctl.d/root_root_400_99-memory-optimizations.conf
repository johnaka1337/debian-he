# --- MEMORY & SWAP (Optimized for NVMe & Heavy Workloads) ---
vm.swappiness = 10

vm.dirty_background_ratio = 0 # 1
vm.dirty_ratio = 0 # 2

# I/O Flush Tuning (Bytes instead of Ratios for large RAM)
# 64 MB: threshold for background flusher threads to wake up
vm.dirty_background_bytes = 67108864

# 256 MB: hard limit where processes generating I/O are forced to wait
vm.dirty_bytes = 268435456

vm.max_map_count = 2097152
