# --- MEMORY & SWAP (Optimized for NVMe & Heavy Workloads) ---
vm.swappiness = 1

#vm.dirty_background_ratio = 2
#vm.dirty_ratio = 4

# I/O Flush Tuning (Bytes instead of Ratios for large RAM)
# 128 MB: threshold for background flusher threads to wake up
vm.dirty_background_bytes = 134217728

# 512 MB: hard limit where processes generating I/O are forced to wait
vm.dirty_bytes = 536870912

vm.max_map_count = 2097152
